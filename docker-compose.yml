services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio_server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_auth
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_URL: http://localhost:8081
      KC_HOSTNAME_STRICT: "false"
    command: start-dev --import-realm
    ports:
      - "8081:8080"
      - "9002:9000"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-storage-system.json:/opt/keycloak/data/import/realm-storage-system.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:18-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dotnet_api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};GSS Encryption Mode=Disable
      - Minio__Endpoint=minio:9000
      - Minio__PublicEndpoint=localhost:9000
      - Minio__AccessKey=${MINIO_ROOT_USER}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD}
      - Minio__BucketName=files
      - Minio__UseSsl=false
      - Minio__PresignedUrlExpirySeconds=900
      - ASPNETCORE_ENVIRONMENT=Development
      - ApplyMigrations=true
      - Keycloak__Authority=${KEYCLOAK_AUTHORITY:-http://localhost:8081/realms/StorageSystemRealm}
      - Keycloak__ClientId=${KEYCLOAK_CLIENT_ID:-storage-swagger}
      - Keycloak__MetadataAddress=${KEYCLOAK_METADATA_ADDRESS:-http://host.docker.internal:8081/realms/StorageSystemRealm/.well-known/openid-configuration}
      - Keycloak__ValidIssuer=${KEYCLOAK_VALID_ISSUER:-http://localhost:8081/realms/StorageSystemRealm}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
  keycloak_data:
